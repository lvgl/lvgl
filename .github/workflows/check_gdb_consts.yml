name: Verify GDB constants are up-to-date
on:
  push:
  pull_request:

# https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#concurrency
# Ensure that only one commit will be running tests at a time on each PR
concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  verify-gdb-consts:
    if: ${{ github.event_name != 'pull_request' || github.repository != github.event.pull_request.head.repo.full_name }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12
      - name: Regenerate GDB constants
        run: python3 scripts/gdb/scripts/generate_all.py
      - name: Check that repository is clean
        run: |
          git diff --exit-code >/dev/null 2>&1 || \
            (echo "GDB constants are out of date. Please run: python3 scripts/gdb/scripts/generate_all.py"; false)
